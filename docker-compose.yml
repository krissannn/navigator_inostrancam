version: '3.8'

services:
  db:
    image: postgres:15
    container_name: navigator_db
    environment:
      POSTGRES_DB: navigator
      POSTGRES_USER: navigator_user
      POSTGRES_PASSWORD: navigator_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: navigator_backend
    environment:
      DATABASE_URL: postgresql://navigator_user:navigator_pass@db:5432/navigator
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: navigator_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: